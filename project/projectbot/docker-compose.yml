# =============================================================================
# PRODUCTION DOCKER COMPOSE FOR TELEGRAM BOT
# =============================================================================

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectbot
    restart: unless-stopped

    # Load environment variables from .env file
    env_file:
      - .env

    # Persistent volume for database
    volumes:
      - ./data:/app/data

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
